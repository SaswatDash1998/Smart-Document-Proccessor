### GraphRAG v3 settings — wired to Cerebras for LLM, Ollama for embeddings
### Place this file at: data/settings.yaml

# ── LLM (Cerebras — OpenAI-compatible) ──────────────────────────────────────
# The key MUST be "default_completion_model" — that's what GraphRAG looks for internally.

completion_models:
  default_completion_model:
    model_provider: cerebras
    model: llama-3.1-8b    # 128k context window
    auth_method: api_key
    api_key: csk-pw2hvcj3yfy6myvjxj5fc9e4k3fdpwh4pn429thnmtcnewxe
    retry:
      type: exponential_backoff

# ── Embeddings (Ollama — local) ──────────────────────────────────────────────
# The key MUST be "default_embedding_model".

embedding_models:
  default_embedding_model:
    model_provider: gemini
    model: gemini-embedding-001
    auth_method: api_key
    api_key: AIzaSyDYXpDXXsNGdZ4kg59aSM6abi2o7i1Mr5I

# ── Input ────────────────────────────────────────────────────────────────────

input:
  type: text

chunking:
  type: sentence
  size: 600              # ⬆️ Larger chunks for small corpus (fewer chunks = faster)
  overlap: 0             # ⬇️ No overlap for speed
  encoding_model: cl100k_base

# ── Storage ──────────────────────────────────────────────────────────────────

input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

# ── Vector store (local LanceDB — no extra setup needed) ─────────────────────

vector_store:
  type: lancedb
  db_uri: "output/lancedb"
  vector_size: 768  # CRITICAL: Match Gemini's embedding dimension (was defaulting to 3072!)

# ── Workflow ──────────────────────────────────────────────────────────────────

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [organization, person]  # ⬇️ Reduced from 4 to 2 types for speed
  max_gleanings: 0                      # ⬇️ Skip refinement pass (major speedup)

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 20   # ⬆️ Bigger clusters = fewer community reports to generate

extract_claims:
  enabled: false                    # flip to true if you want covariates
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to the analysis."
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 800        # ⬇️ Much shorter reports (4x faster generation)
  max_input_length: 3000 # ⬇️ Less input to process
 
snapshots:
  graphml: false
  embeddings: false
 
# ── Query ─────────────────────────────────────────────────────────────────────
 
local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"
 
global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"
 
drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"
 
basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"